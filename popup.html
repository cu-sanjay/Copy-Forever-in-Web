<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipboard Eternity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="8" y="2" width="8" height="4" rx="1.5" fill="currentColor" opacity="0.5"/>
            <rect x="5" y="4" width="14" height="18" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M9 10h6M9 13h6M9 16h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="header-text">
          <span class="app-name">Clipboard Eternity</span>
          <span class="item-count" id="itemCount">0 items</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="exportBtn" title="Export history">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v13M8 12l4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn danger" id="clearBtn" title="Clear all (hold to confirm)">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="search-bar">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="search-icon">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"/>
        <path d="M16.5 16.5L21 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search your copies..." autocomplete="off" spellcheck="false" />
      <button class="clear-search" id="clearSearch" style="display:none">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="link">Links</button>
      <button class="filter-btn" data-filter="code">Code</button>
      <button class="filter-btn" data-filter="text">Text</button>
      <button class="filter-btn" data-filter="favorite">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
        Saved
      </button>
    </div>

    <div class="list-container" id="listContainer">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none">
            <rect x="8" y="2" width="8" height="4" rx="1.5" stroke="currentColor" stroke-width="1.3" fill="none"/>
            <rect x="5" y="4" width="14" height="18" rx="2" stroke="currentColor" stroke-width="1.3" fill="none"/>
            <path d="M9 11h6M9 14h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">Nothing saved yet</p>
        <p class="empty-sub">Press Ctrl+C anywhere to start saving</p>
      </div>
      <ul class="clip-list" id="clipList"></ul>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <template id="clipTemplate">
    <li class="clip-item" data-id="">
      <div class="clip-header">
        <span class="clip-type-badge"></span>
        <span class="clip-time"></span>
        <div class="clip-actions">
          <button class="action-btn fav-btn" title="Save">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z" stroke="currentColor" stroke-width="1.8"/>
            </svg>
          </button>
          <button class="action-btn copy-btn" title="Copy">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <rect x="9" y="9" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
              <path d="M15 9V6a1.5 1.5 0 00-1.5-1.5H6A1.5 1.5 0 004.5 6v7.5A1.5 1.5 0 006 15h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="action-btn del-btn" title="Delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="clip-body">
        <p class="clip-text"></p>
        <a class="clip-link" href="#" target="_blank" rel="noopener noreferrer"></a>
      </div>
      <div class="clip-source"></div>
    </li>
  </template>

  <div class="modal-overlay" id="exportModal" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span>Export History</span>
        <button class="icon-btn" id="closeModal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-desc">Choose export format for your clipboard history</p>
        <div class="export-options">
          <button class="export-opt" id="exportJson">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8 12h8M8 8h5M8 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="opt-title">JSON</span>
            <span class="opt-sub">Full data with metadata</span>
          </button>
          <button class="export-opt" id="exportCsv">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 9h18M9 9v12M3 15h18" stroke="currentColor" stroke-width="1.5"/>
            </svg>
            <span class="opt-title">CSV</span>
            <span class="opt-sub">Spreadsheet-ready</span>
          </button>
          <button class="export-opt" id="exportTxt">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8 8h8M8 12h8M8 16h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="opt-title">Plain Text</span>
            <span class="opt-sub">Simple list</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
